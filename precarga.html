<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pacoal.dev</title>

    <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <style>
        :root {
            --colorBg: #05080d;
            --colorBgSoft: #0b1220;
            --colorPanel: rgba(255, 255, 255, 0.05);
            --colorBorder: rgba(255, 255, 255, 0.1);
            --colorText: #f5f7fa;
            --colorTextSoft: rgba(245, 247, 250, 0.72);
            --colorPrimary: #60a5fa;
            --colorSecondary: #22d3ee;
            --shadowMain: 0 24px 80px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        body {
            background: #0b0f14;
            overflow: hidden;
        }

        .preloader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at 20% 20%, rgba(96, 165, 250, 0.12), transparent 25%),
                radial-gradient(circle at 80% 30%, rgba(34, 211, 238, 0.08), transparent 25%),
                linear-gradient(180deg, var(--colorBg) 0%, var(--colorBgSoft) 100%);
        }

        .preloaderPanel {
            width: min(460px, 100%);
            padding: 28px;
            border: 1px solid var(--colorBorder);
            border-radius: 20px;
            background: var(--colorPanel);
            backdrop-filter: blur(16px);
            box-shadow: var(--shadowMain);
        }

        .preloaderTop {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 16px;
        }

        .preloaderLabel {
            font-family: Arial, sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--colorTextSoft);
        }

        .preloaderPercent {
            font-family: Arial, sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--colorText);
            font-variant-numeric: tabular-nums;
        }

        .progressBar {
            width: 100%;
            height: 8px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
        }

        .progressFill {
            width: 0%;
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--colorPrimary) 0%, var(--colorSecondary) 100%);
            box-shadow: 0 0 24px rgba(96, 165, 250, 0.4);
        }

        .progressMeta {
            margin-top: 12px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            color: var(--colorTextSoft);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .pageContent {
            opacity: 0;
            transform: translateY(14px);
        }

        @media (max-width: 640px) {
            .preloaderPanel {
                padding: 22px;
                border-radius: 18px;
            }
        }
    </style>
</head>

<body>
    <div class="preloader" id="preloader">
        <div class="preloaderPanel">
            <div class="preloaderTop">
                <span class="preloaderLabel">Loading...</span>
                <span class="preloaderPercent" id="progressText">0%</span>
            </div>

            <div class="progressBar">
                <div class="progressFill" id="progressFill"></div>
            </div>

            <div class="progressMeta" id="progressMeta">Inicializando</div>
        </div>
    </div>

    <div class="pageContent" id="pageContent">
        <!-- aqui va TODA tu home real actual -->
    </div>

    <script>
        const ProgressState = { value: 0 };

        const ProgressText = document.getElementById("progressText");
        const ProgressFill = document.getElementById("progressFill");
        const ProgressMeta = document.getElementById("progressMeta");
        const Preloader = document.getElementById("preloader");
        const PageContent = document.getElementById("pageContent");

        const StepList = [
            { limit: 20, text: "Inicializando" },
            { limit: 45, text: "Cargando interfaz" },
            { limit: 70, text: "Preparando contenido" },
            { limit: 95, text: "Aplicando transiciones" },
            { limit: 100, text: "Listo" }
        ];

        const UpdateProgress = () => {
            const CurrentValue = Math.round(ProgressState.value);

            ProgressText.textContent = `${CurrentValue}%`;
            ProgressFill.style.width = `${CurrentValue}%`;

            const CurrentStep = StepList.find((StepItem) => CurrentValue <= StepItem.limit);
            if (CurrentStep) {
                ProgressMeta.textContent = CurrentStep.text;
            }
        };

        const StartPreloader = () => {
            gsap.to(ProgressState, {
                value: 100,
                duration: 1.6,
                ease: "power2.out",
                onUpdate: UpdateProgress,
                onComplete: () => {
                    const Timeline = gsap.timeline();

                    Timeline
                        .to(".preloaderPanel", {
                            y: -18,
                            opacity: 0,
                            duration: 0.35,
                            ease: "power2.inOut"
                        })
                        .to(Preloader, {
                            opacity: 0,
                            duration: 0.45,
                            ease: "power2.inOut",
                            onComplete: () => {
                                Preloader.style.display = "none";
                                document.body.style.overflow = "auto";
                            }
                        }, "-=0.08")
                        .to(PageContent, {
                            opacity: 1,
                            y: 0,
                            duration: 0.55,
                            ease: "power3.out"
                        }, "-=0.15");
                }
            });
        };

        window.addEventListener("load", () => {
            StartPreloader();
        });
    </script>
</body>

</html>
