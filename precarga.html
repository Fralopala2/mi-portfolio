<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pacoal.dev — Preloader</title>

    <link rel="stylesheet" href="css/index.css">
    <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #171717;
        }

        .pageContent {
            opacity: 0;
            transform: translateY(14px);
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: #f5f5f5;
            font-family: poppins, sans-serif;
        }
    </style>
</head>

<body>
    <div class="preloader" id="preloader">
        <div class="preloader-bg" aria-hidden="true">
            <div class="preloader-grid"></div>
            <div class="preloader-orb preloader-orb--1"></div>
            <div class="preloader-orb preloader-orb--2"></div>
            <div class="preloader-orb preloader-orb--3"></div>
            <div class="preloader-scanline"></div>
        </div>

        <div class="preloader-content">
            <div class="preloader-brand">
                <div class="preloader-logo-wrap">
                    <div class="preloader-logo-ring"></div>
                    <img src="images/willy wonka logo.png" alt="" class="preloader-logo" width="76" height="76">
                </div>
                <div class="preloader-name">
                    <span class="preloader-name-accent">Paco</span><span class="preloader-name-rest"> López</span>
                </div>
                <p class="preloader-tagline">Backend Developer · Portfolio</p>
            </div>

            <div class="preloader-progress-block">
                <div class="preloader-percent-wrap">
                    <span class="preloader-percent" id="progressText">0</span>
                    <span class="preloader-percent-symbol">%</span>
                </div>
                <div class="progressBar">
                    <div class="progressFill" id="progressFill">
                        <span class="progressFill-shine"></span>
                    </div>
                </div>
                <div class="preloader-steps" id="preloaderSteps">
                    <span class="preloader-step is-active" data-limit="20">01</span>
                    <span class="preloader-step" data-limit="45">02</span>
                    <span class="preloader-step" data-limit="70">03</span>
                    <span class="preloader-step" data-limit="95">04</span>
                    <span class="preloader-step" data-limit="100">05</span>
                </div>
                <div class="progressMeta" id="progressMeta">Inicializando</div>
            </div>
        </div>

        <div class="preloader-footer">
            <span class="preloaderLabel">Loading experience</span>
            <span class="preloader-year">2026</span>
        </div>
    </div>

    <div class="pageContent" id="pageContent">
        <p>Contenido de la home aquí</p>
    </div>

    <script>
        const ProgressState = { value: 0 };
        const progressText = document.getElementById("progressText");
        const progressFill = document.getElementById("progressFill");
        const progressMeta = document.getElementById("progressMeta");
        const preloaderSteps = document.getElementById("preloaderSteps");
        const Preloader = document.getElementById("preloader");
        const PageContent = document.getElementById("pageContent");

        const StepList = [
            { limit: 20, text: "Inicializando" },
            { limit: 45, text: "Cargando interfaz" },
            { limit: 70, text: "Preparando contenido" },
            { limit: 95, text: "Aplicando transiciones" },
            { limit: 100, text: "Listo" }
        ];

        const UpdateProgress = () => {
            const CurrentValue = Math.round(ProgressState.value);

            progressText.textContent = `${CurrentValue}`;
            progressFill.style.width = `${CurrentValue}%`;

            const CurrentStep = StepList.find((StepItem) => CurrentValue <= StepItem.limit);
            if (CurrentStep) {
                progressMeta.textContent = CurrentStep.text;
            }

            const StepElements = preloaderSteps.querySelectorAll(".preloader-step");
            StepElements.forEach((StepEl, Index) => {
                const StepLimit = Number(StepEl.dataset.limit);
                const PrevLimit = Index === 0 ? -1 : Number(StepElements[Index - 1].dataset.limit);

                StepEl.classList.remove("is-active", "is-done");
                if (CurrentValue > StepLimit) {
                    StepEl.classList.add("is-done");
                } else if (CurrentValue > PrevLimit) {
                    StepEl.classList.add("is-active");
                }
            });
        };

        const StartPreloader = () => {
            gsap.set('.preloader-content', { opacity: 0, y: 36, scale: 0.96 });
            gsap.set('.preloader-footer', { opacity: 0, y: 16 });
            gsap.set('.preloader-logo-wrap', { scale: 0.6, rotation: -12 });
            gsap.set('.preloader-percent-wrap', { opacity: 0, y: 20 });

            gsap.timeline()
                .to('.preloader-content', { opacity: 1, y: 0, scale: 1, duration: 0.9, ease: 'power3.out' })
                .to('.preloader-logo-wrap', { scale: 1, rotation: 0, duration: 0.8, ease: 'back.out(1.6)' }, '-=0.65')
                .to('.preloader-percent-wrap', { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out' }, '-=0.45')
                .to('.preloader-footer', { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' }, '-=0.35');

            gsap.to(ProgressState, {
                value: 100,
                duration: 3.2,
                ease: "power2.out",
                onUpdate: UpdateProgress,
                onComplete: () => {
                    const Timeline = gsap.timeline();

                    Timeline
                        .to(".preloader-content", {
                            y: -24,
                            scale: 0.97,
                            opacity: 0,
                            filter: "blur(8px)",
                            duration: 0.55,
                            ease: "power2.in"
                        })
                        .to(".preloader-footer", {
                            opacity: 0,
                            y: -10,
                            duration: 0.35,
                            ease: "power2.in"
                        }, "-=0.45")
                        .to(Preloader, {
                            opacity: 0,
                            duration: 0.45,
                            ease: "power2.inOut",
                            onComplete: () => {
                                Preloader.style.display = "none";
                                document.body.style.overflow = "auto";
                            }
                        }, "-=0.08")
                        .to(PageContent, {
                            opacity: 1,
                            y: 0,
                            duration: 0.55,
                            ease: "power3.out"
                        }, "-=0.15");
                }
            });
        };

        window.addEventListener("load", StartPreloader);
    </script>
</body>

</html>
